name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bruin-data/bruin

jobs:
  integration-tests:
    strategy:
      matrix:
        platform: [ depot-ubuntu-latest-4, depot-macos-15, windows-2022 ]
        suite: ["test", "integration-test"]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: true
      - name: Install R in background (Ubuntu)
        if: matrix.suite == 'integration-test' && startsWith(matrix.platform, 'depot-ubuntu')
        run: |
          nohup bash -c 'sudo apt-get install -y --no-install-recommends r-base-core 2>/dev/null || (sudo apt-get update && sudo apt-get install -y --no-install-recommends r-base-core)' > /tmp/r_install.log 2>&1 &
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: Cache Rust artifacts
        id: rust-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pkg/sqlparser/rustffi/target
          key: rust-${{ runner.os }}-${{ hashFiles('pkg/sqlparser/rustffi/Cargo.lock', 'pkg/sqlparser/rustffi/Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-
      - name: Touch cached Rust lib
        if: steps.rust-cache.outputs.cache-hit == 'true'
        shell: bash
        run: touch pkg/sqlparser/rustffi/target/release/libbruin_rustsqlparser.a
      - name: Setup Rust
        if: steps.rust-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
      - name: Install R (macOS)
        if: matrix.suite == 'integration-test' && startsWith(matrix.platform, 'depot-macos')
        run: |
          brew install r
      - name: Install R (Windows)
        if: matrix.suite == 'integration-test' && matrix.platform == 'windows-2022'
        shell: bash
        run: |
          choco install r.project -y
      - name: Wait for R (Ubuntu)
        if: matrix.suite == 'integration-test' && startsWith(matrix.platform, 'depot-ubuntu')
        run: |
          while ! command -v Rscript &>/dev/null; do sleep 1; done
      - name: Run test suite
        shell: bash
        run: |
          [[ "${{runner.os}}" != 'Windows' ]] || export PATH="/c/mingw64/bin:$PATH"
          make ${{ matrix.suite }}

  cloud-integration-tests:
    name: Cloud Integration Tests (BigQuery)
    runs-on: depot-ubuntu-latest-4
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: Cache Rust artifacts
        id: rust-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pkg/sqlparser/rustffi/target
          key: rust-${{ runner.os }}-${{ hashFiles('pkg/sqlparser/rustffi/Cargo.lock', 'pkg/sqlparser/rustffi/Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-
      - name: Touch cached Rust lib
        if: steps.rust-cache.outputs.cache-hit == 'true'
        run: touch pkg/sqlparser/rustffi/target/release/libbruin_rustsqlparser.a
      - name: Setup Rust
        if: steps.rust-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build Bruin
        run: make build

      - name: Create cloud config file
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          cat > integration-tests/cloud-integration-tests/.bruin.cloud.yml << EOF
          default_environment: default
          environments:
            default:
              connections:
                google_cloud_platform:
                  - name: gcp-default
                    project_id: "${GCP_PROJECT_ID}"
                    service_account_json: '${GCP_SERVICE_ACCOUNT_JSON}'
          EOF

      - name: Test BigQuery connection (fail fast)
        run: |
          ./bin/bruin connections test \
            --config-file integration-tests/cloud-integration-tests/.bruin.cloud.yml \
            --env default \
            --name gcp-default

      - name: Run BigQuery Integration Tests
        run: |
          cd integration-tests/cloud-integration-tests/bigquery
          go test -v -timeout 30m ./...

  prepare-darwin:
    runs-on: depot-ubuntu-latest-8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - shell: bash
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: cache darwin
        uses: actions/cache@v4
        with:
          path: dist/darwin
          key: darwin-${{ env.sha_short }}
      - name: Run GoReleaser
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker run --privileged   -v /var/run/docker.sock:/var/run/docker.sock -e GGOOS=darwin -e GORELEASER_KEY=${{ secrets.GORELEASER_KEY }} -e COMMIT_SHA=${{ github.sha }} -e VERSION=${{ github.ref_name }} -e GITHUB_TOKEN=${{ secrets.RELEASE_TOKEN }} -e TELEMETRY_KEY=${{ secrets.TELEMETRY_KEY }} -v $(pwd):/src -w /src goreleaser/goreleaser-cross-pro:v1.23 release --clean --split --verbose


  prepare-linux:
    runs-on: depot-ubuntu-latest-8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - shell: bash
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: cache linux
        uses: actions/cache@v4
        with:
          path: dist/linux
          key: linux-${{ env.sha_short }}
      - name: Run GoReleaser
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker run --privileged   -v /var/run/docker.sock:/var/run/docker.sock -e GGOOS=linux -e GORELEASER_KEY=${{ secrets.GORELEASER_KEY }} -e COMMIT_SHA=${{ github.sha }} -e VERSION=${{ github.ref_name }} -e GITHUB_TOKEN=${{ secrets.RELEASE_TOKEN }} -e TELEMETRY_KEY=${{ secrets.TELEMETRY_KEY }} -v $(pwd):/src -w /src goreleaser/goreleaser-cross-pro:v1.23 release --clean --split --verbose


  release-unix:
    runs-on: depot-ubuntu-latest
    needs: [prepare-linux, prepare-darwin, integration-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - shell: bash
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: dist/linux
          key: linux-${{ env.sha_short }}
      - uses: actions/cache@v4
        with:
          path: dist/darwin
          key: darwin-${{ env.sha_short }}
      - uses: goreleaser/goreleaser-action@v3
        with:
          distribution: goreleaser-pro
          version: v2.3.2
          args: continue --merge
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          TELEMETRY_KEY: ${{ secrets.TELEMETRY_KEY }}

  release-windows:
    runs-on: depot-windows-latest
    needs: [prepare-linux, prepare-darwin, integration-tests]
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gcc-libs
            mingw-w64-ucrt-x86_64-winpthreads

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"

      - name: Release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.3.2
          distribution: goreleaser-pro
          args: release --clean --split
        env:
          # existing env
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          VERSION: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          TELEMETRY_KEY: ${{ secrets.TELEMETRY_KEY }}
          GGOOS: windows

          # ✅ make Windows CGO use MinGW-UCRT and link runtime statically
          CGO_ENABLED: 1
          CC: x86_64-w64-mingw32-gcc
          CGO_LDFLAGS: "-static-libgcc -static-libstdc++ -Wl,-Bstatic -lwinpthread -Wl,-Bdynamic"

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/windows/bruin_Windows_x86_64.zip
          asset_name: bruin_Windows_x86_64.zip
          tag: ${{ github.ref }}
          overwrite: false
          make_latest: false
          prerelease: false

  dockerBuild:
    runs-on: depot-ubuntu-latest
    name: Docker Build
    permissions:
      # allow issuing OIDC tokens for this workflow run
      id-token: write
      # allow at least reading the repo contents, add other permissions if necessary
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: bruin-data
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up Depot
        uses: depot/setup-action@v1

      - name: Build and push Docker image
        uses: depot/build-push-action@v1
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            BRANCH_NAME=${{ github.ref_name }}

  dockerTest:
    runs-on: depot-ubuntu-latest
    name: Test Docker Image
    needs: [dockerBuild]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: bruin-data
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull the built Docker image
        run: |
          echo "Pulling image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: Test Python pipeline initialization
        run: |
          echo "Creating test directory..."
          mkdir -p /tmp/docker-test
          chmod 777 /tmp/docker-test

          echo "Initializing Python pipeline..."
          docker run --rm \
            -v /tmp/docker-test:/tmp/docker-test \
            -w /tmp/docker-test \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            bruin init python --in-place python-pipeline

          echo "Verifying Python pipeline was created..."
          ls -la /tmp/docker-test/python-pipeline

      - name: Test running Python pipeline
        run: |
          echo "Running Python pipeline..."
          docker run --rm \
            -v /tmp/docker-test:/tmp/docker-test \
            -w /tmp/docker-test/python-pipeline \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            bruin run .

      - name: Test DuckDB pipeline initialization
        run: |
          echo "Initializing DuckDB pipeline..."
          chmod 777 /tmp/docker-test
          docker run --rm \
            -v /tmp/docker-test:/tmp/docker-test \
            -w /tmp/docker-test \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            bruin init duckdb --in-place duckdb-pipeline

          echo "Verifying DuckDB pipeline was created..."
          ls -la /tmp/docker-test/duckdb-pipeline

      - name: Test running DuckDB pipeline
        run: |
          echo "Running DuckDB pipeline..."
          docker run --rm \
            -v /tmp/docker-test:/tmp/docker-test \
            -w /tmp/docker-test/duckdb-pipeline \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            bruin run .

      - name: Cleanup test files
        if: always()
        run: |
          # The image runs as user `bruin` and may create root-owned or non-runner-owned files
          # in the bind mount; cleanup via a root container avoids permission issues.
          docker run --rm --user root \
            -v /tmp/docker-test:/tmp/docker-test \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            sh -c 'find /tmp/docker-test -mindepth 1 -delete'
          rm -rf /tmp/docker-test

  install-windows:
    runs-on: windows-latest
    name: Installer Script on Windows
    needs: [release-windows, release-unix]
    steps:
      - uses: actions/checkout@v4
      - name: Show directories
        shell: bash
        run: pwd && cd && pwd
      - name: Use install script
        shell: bash
        run: curl -LsSf https://getbruin.com/install/cli | sh -s -- -d ${GITHUB_REF##*/}
      - name: Test Pipeline
        shell: bash
        run: ~/.local/bin/bruin.exe init chess test-pipeline && cd test-pipeline && ~/.local/bin/bruin.exe run .

  install-unix:
    runs-on: ubuntu-latest
    name: Installer Script on Linux
    needs: [release-windows, release-unix]
    steps:
      - uses: actions/checkout@v4
      - name: Extract tag from ref
        id: extract_tag
        run: |
          ref_name="${GITHUB_REF##*/}"
          echo "tag=${ref_name}" >> $GITHUB_ENV
      - name: Use install script
        run: curl -LsSf https://getbruin.com/install/cli | sh -s -- -d ${{ env.tag }}
      - name: Test Pipeline
        run: bruin init chess test-pipeline && cd test-pipeline && bruin run .

  release:
    runs-on: ubuntu-latest
    needs: [install-unix, install-windows]
    steps:
      - uses: actions/checkout@v4
      - name: Extract tag from ref
        id: extract_tag
        run: |
          ref_name="${GITHUB_REF##*/}"
          echo "tag=${ref_name}" >> $GITHUB_ENV
      - name: Release promote to latest
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.tag }}
          prerelease: false
          make_latest: true
          clear_attachments: false
