# Depot CI Migration
# Source: .github/workflows/build-test.yml

name: CI Checks
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'resources/**'
      - 'templates/**'
      - 'install.sh'
      - 'README.md'
      - 'Makefile'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'resources/**'
      - 'templates/**'
      - 'install.sh'
      - 'README.md'
      - 'Makefile'
      - 'package.json'
      - 'package-lock.json'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || (github.ref == 'refs/heads/main' && github.sha || github.ref) }}
  cancel-in-progress: true
env:
  DOCKER_BUILDKIT: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: bruin-data/bruin
jobs:
  test:
    strategy:
      matrix:
        platform: [depot-ubuntu-24.04-8]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: true
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: Cache Rust artifacts
        id: rust-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pkg/sqlparser/rustffi/target
          key: rust-${{ runner.os }}-${{ hashFiles('pkg/sqlparser/rustffi/Cargo.lock', 'pkg/sqlparser/rustffi/Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-
      - name: Touch cached Rust lib
        if: steps.rust-cache.outputs.cache-hit == 'true'
        run: touch pkg/sqlparser/rustffi/target/release/libbruin_rustsqlparser.a
      - name: Setup Rust
        if: steps.rust-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
      - run: make test
  end2end:
    strategy:
      matrix:
        platform: [depot-ubuntu-24.04-8]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Install R (background)
        run: |
          nohup bash -c 'sudo apt-get install -y --no-install-recommends r-base-core 2>/dev/null || (sudo apt-get update && sudo apt-get install -y --no-install-recommends r-base-core)' > /tmp/r_install.log 2>&1 &
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: true
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: Cache Rust artifacts
        id: rust-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pkg/sqlparser/rustffi/target
          key: rust-${{ runner.os }}-${{ hashFiles('pkg/sqlparser/rustffi/Cargo.lock', 'pkg/sqlparser/rustffi/Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-
      - name: Touch cached Rust lib
        if: steps.rust-cache.outputs.cache-hit == 'true'
        run: touch pkg/sqlparser/rustffi/target/release/libbruin_rustsqlparser.a
      - name: Setup Rust
        if: steps.rust-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
      - name: Wait for R
        run: |
          while ! command -v Rscript &>/dev/null; do sleep 1; done
      - name: Run integration tests
        run: make integration-test
  dockerBuild:
    runs-on: depot-ubuntu-latest
    name: Docker Build
    permissions:
      # allow issuing OIDC tokens for this workflow run
      id-token: write
      # allow at least reading the repo contents, add other permissions if necessary
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: bruin-data
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Set up Depot
        uses: depot/setup-action@v1
      - name: Build Docker image
        uses: depot/build-push-action@v1
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
            BRANCH_NAME=${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
  lint:
    runs-on: depot-ubuntu-24.04-8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: Cache golangci-lint analysis
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ hashFiles('go.sum') }}-${{ github.sha }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-${{ hashFiles('go.sum') }}-
      - name: Install golangci-lint
        run: |
          VERSION=$(grep '^GOLANGCI_LINT_VERSION=' Makefile | cut -d= -f2)
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin ${VERSION}
      - name: Run golangci-lint
        run: golangci-lint run --timeout 10m60s ./...
