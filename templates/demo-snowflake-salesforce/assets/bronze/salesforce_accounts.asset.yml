name: bronze.salesforce_accounts
type: ingestr
description: |
  Ingests Salesforce Account records into Snowflake through Bruin's built-in
  ingestr runner. This table is the bronze CRM account grain for the credit union demo.

  The asset represents raw Account records from Salesforce Sales Cloud after
  Bruin/ingestr applies snake_case naming and schema enforcement for the selected
  account fields. It is upstream of the account health and opportunity pipeline
  silver marts, where accounts are joined to Contacts, Opportunities, and Tasks
  for relationship, lending pipeline, and banker activity analysis.

  Most credit union demo rows are generated by bronze.seed_salesforce_demo_data before
  ingestion. Those synthetic records use deterministic AccountNumber values in
  the CREDIT-UNION-DEMO-YYYYMMDD-NNN pattern and Account names that encode branch
  market, relationship profile, business date, and sequence. The same Salesforce
  object may also contain pre-existing sample rows, so nullable CRM attributes
  such as account_number, type, industry, and billing geography should not be
  assumed complete across the full table.

  This is a mutable bronze source table, not an append-only event stream. Initial
  demo ingestion should use full refresh after Salesforce seeding because
  Salesforce SystemModstamp reflects the actual Salesforce write time, while
  synthetic business dates live in related business fields such as Opportunity
  CloseDate and Task ActivityDate. Regular scheduled runs merge incrementally by
  SystemModstamp and cluster the Snowflake table on system_modstamp.
connection: snowflake-default
tags:
  - finance
  - credit_union
  - crm
  - salesforce
  - snowflake
  - bronze
  - raw_ingest
  - ingestr
  - daily_batch
  - internal
  - potential_pii
domains:
  - crm
  - member_relationships
  - lending
meta:
  asset_grain: One row per Salesforce Account record after merge by id.
  clustering: Snowflake clustering is configured on system_modstamp.
  destination_table: CREDIT_UNION_DEMO.BRONZE.SALESFORCE_ACCOUNTS
  downstream_usage: Feeds silver.salesforce_account_health and silver.salesforce_opportunity_pipeline.
  expected_volume: Verified Snowflake run on 2026-06-22 loaded 182 Account rows, including 169 generated demo rows plus existing Salesforce sample rows.
  load_pattern: Mutable merge on Salesforce SystemModstamp, not append-only.
  operational_caveat: Salesforce SystemModstamp is a source write timestamp and does not represent the synthetic historical business date.
  pipeline_role: Bronze CRM source ingestion.
  refresh_cadence: Daily batch pipeline; full refresh is preferred for the first load after demo seeding.
  sensitivity: Internal CRM data; account names and account numbers can identify member households or business relationships in non-demo data.
  source_object: Account
  source_system: Salesforce Sales Cloud
  upstream_context: bronze.seed_salesforce_demo_data creates deterministic CREDIT-UNION-DEMO account records in Salesforce before ingestion.

depends:
  - bronze.seed_salesforce_demo_data

parameters:
  cluster_by: system_modstamp
  destination: snowflake
  enforce_schema: "true"
  incremental_key: SystemModstamp
  incremental_strategy: merge
  schema_contract: evolve
  schema_naming: snake_case
  source_connection: salesforce
  source_table: account

columns:
  - name: id
    type: VARCHAR
    description: Salesforce Account identifier. Raw Salesforce primary identifier and merge key for this bronze extract; expected high-cardinality, non-null, and unique per Account record.
    primary_key: true
    meta:
      cardinality: high
      semantic_type: identifier
      source_field: Id
    checks:
      - name: not_null
      - name: unique
  - name: account_number
    type: VARCHAR
    description: External account number used by the demo generator for deterministic upserts. Raw Salesforce AccountNumber business key; generated demo values follow CREDIT-UNION-DEMO-YYYYMMDD-NNN, while pre-existing Salesforce sample accounts may leave this field blank.
    tags:
      - business_key
      - potential_pii
    meta:
      cardinality: high
      demo_pattern: CREDIT-UNION-DEMO-YYYYMMDD-NNN
      nullability_note: Nullable; pre-existing Salesforce sample accounts may have blank AccountNumber
      semantic_type: identifier
      source_field: AccountNumber
  - name: name
    type: VARCHAR
    description: Account display name. Raw Salesforce Account Name dimension; generated demo names encode credit union branch market, relationship profile, business date, and sequence. Treat as potentially identifying CRM text.
    tags:
      - potential_pii
    meta:
      cardinality: high
      contains_encoded_data: Demo names encode branch market (Dublin, Fremont, Walnut Creek, San Jose, Sacramento, Stockton, San Mateo, San Diego), relationship profile (Household, Small Business, Community Nonprofit, Employer Group, Indirect Dealer Partner, Prospective Member), business date, and sequence number
      semantic_type: dimension
      source_field: Name
    checks:
      - name: not_null
  - name: type
    type: VARCHAR
    description: Salesforce account type. Raw low-cardinality CRM classification such as Customer - Direct, Channel Partner, or Prospect when populated by the demo generator.
    meta:
      cardinality: low
      expected_values: Customer - Direct, Channel Partner, Prospect
      semantic_type: dimension
      source_field: Type
  - name: industry
    type: VARCHAR
    description: Industry or relationship segment. Raw Salesforce categorical dimension used in this demo to approximate member, business, nonprofit, employer group, dealer partner, and prospect relationship context.
    meta:
      cardinality: low
      expected_values: Banking, Finance, Education, Healthcare, Automotive
      semantic_type: dimension
      source_field: Industry
      usage_note: Used in demo to approximate member household, small business, community nonprofit, employer group, indirect dealer partner, and prospective member relationship segments
  - name: billing_city
    type: VARCHAR
    description: Account billing city. Raw billing geography dimension; generated demo rows use California branch-market cities such as Dublin, Fremont, Walnut Creek, San Jose, Sacramento, Stockton, San Mateo, and San Diego.
    meta:
      cardinality: medium
      demo_values: Dublin, Fremont, Walnut Creek, San Jose, Sacramento, Stockton, San Mateo, San Diego
      semantic_type: dimension
      source_field: BillingCity
  - name: billing_state
    type: VARCHAR
    description: Account billing state. Raw billing geography dimension; generated demo rows use California, but source Salesforce sample records may vary or be blank.
    meta:
      cardinality: low
      demo_value: California
      semantic_type: dimension
      source_field: BillingState
  - name: created_date
    type: TIMESTAMP
    description: Timestamp when the Account was created in Salesforce. Raw Salesforce audit timestamp in source-system time semantics; useful for source recency diagnostics but not the synthetic demo business date.
    meta:
      semantic_type: timestamp
      source_field: CreatedDate
      timezone_note: Source system timezone (Salesforce)
      usage_note: This is the Salesforce record creation timestamp, not the synthetic business date used in demo data generation
    checks:
      - name: not_null
  - name: last_modified_date
    type: TIMESTAMP
    description: Timestamp when the Account was last modified in Salesforce. Raw Salesforce audit timestamp showing the last user or process update to the Account record.
    meta:
      semantic_type: timestamp
      source_field: LastModifiedDate
      temporal_relationship: Should be >= created_date
      timezone_note: Source system timezone (Salesforce)
    checks:
      - name: not_null
  - name: system_modstamp
    type: TIMESTAMP
    description: Salesforce system modification timestamp used as the incremental key. Raw Salesforce replication timestamp used by ingestr merge loads and Snowflake clustering; this is the operational watermark for incremental refreshes.
    meta:
      operational_role: Incremental merge key and clustering key
      semantic_type: timestamp
      source_field: SystemModstamp
      temporal_relationship: Should be >= last_modified_date
      timezone_note: Source system timezone (Salesforce)
    checks:
      - name: not_null
