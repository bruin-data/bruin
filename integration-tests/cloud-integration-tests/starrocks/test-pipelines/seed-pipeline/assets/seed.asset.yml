name: bruin_test.seed_contacts
type: starrocks.seed

columns:
  - name: name
    type: STRING
    checks:
      - name: not_null
  - name: channel
    type: STRING
    checks:
      - name: accepted_values
        value:
          - LinkedIn
          - Twitter
  - name: note
    type: STRING

parameters:
  path: ./seed.csv
  file_type: csv
